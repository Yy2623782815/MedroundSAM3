seed: 42

data:
  train_index_jsonl: work/medsam3_my_lora/data_index/chaos_only/train_samples.jsonl
  val_index_jsonl: work/medsam3_my_lora/data_index/chaos_only/val_samples.jsonl
  image_size: 1008
  normalize: true

  # 推荐显式使用 per-device batch。global_batch_size 可选，若设置则会按 world_size 自动折算。
  batch_size_per_device: 4
  val_batch_size_per_device: 4
  # global_batch_size: 8

  # 兼容旧字段（未配置 batch_size_per_device 时会回退读取）
  batch_size: 4
  val_batch_size: 4

  num_workers: 4
  pin_memory: true

model:
  sam3_repo_root: repos/MedSAM3
  checkpoint_path: models/sam3_base/sam3.pt
  bpe_path: repos/MedSAM3/sam3/assets/bpe_simple_vocab_16e6.txt.gz
  device: cuda
  load_from_hf: false

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  train_bias: false
  train_norm: false

train:
  epochs: 2
  lr: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip: 1.0
  bce_weight: 0.5
  dice_weight: 0.5

  # 多 query 掩码 -> 单监督掩码的可配置策略
  query_select:
    mode: logits_max   # logits_max | mask_mean
    topk: 1            # >=1；若 >1 会先选 topk query 再做 reduce
    reduce: mean       # mean | max

output:
  output_dir: work/medsam3_my_lora/outputs/chaos_smoke
